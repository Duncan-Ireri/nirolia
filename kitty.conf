# ---------------------------------------------------------------------------
#  kitty.conf — Generated by niri-noctalia-eos installer
#  JetBrains Mono Nerd Font, dark theme, Wayland-native
# ---------------------------------------------------------------------------

# -- Font --------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
disable_ligatures never

# -- Window ------------------------------------------------------------------
window_padding_width     8 12 8 12
placement_strategy       center
hide_window_decorations  yes
confirm_os_window_close  0
background_opacity       0.92
dynamic_background_opacity yes

# -- Cursor ------------------------------------------------------------------
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# -- Scrollback --------------------------------------------------------------
scrollback_lines 10000

# -- Mouse -------------------------------------------------------------------
mouse_hide_wait     3.0
copy_on_select      yes
strip_trailing_spaces smart

# -- Bell --------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# -- Tab bar -----------------------------------------------------------------
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_title_template  "{index}: {title}"

# -- Keyboard shortcuts ------------------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# -- Shell integration -------------------------------------------------------
shell_integration enabled

# -- Wayland -----------------------------------------------------------------
linux_display_server wayland
wayland_titlebar_color background

# -- Color scheme (Catppuccin Mocha-inspired) --------------------------------
foreground           #cdd6f4
background           #1e1e2e
selection_foreground #1e1e2e
selection_background #89b4fa
cursor               #89b4fa
cursor_text_color    #1e1e2e
url_color            #89b4fa

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #cba6f7
color13 #cba6f7

# Cyan
color6  #89dceb
color14 #89dceb

# White
color7  #bac2de
color15 #a6adc8

# Tab bar colors
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
tab_bar_background      #1e1e2e
