<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  fonts.conf — Generated by niri-noctalia-eos installer

  Sets Rubik as the default system/sans-serif font.
  Sets JetBrains Mono Nerd Font as the default monospace font.
  Noto Color Emoji as emoji fallback.
-->
<fontconfig>

  <!-- Default sans-serif: Rubik -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Rubik</family>
      <family>Inter</family>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Default serif: Noto Serif (Rubik is sans-only) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Default monospace: JetBrains Mono Nerd Font -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Map system-ui to Rubik -->
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Rubik</family>
    </prefer>
  </alias>

  <!-- Map ui-sans-serif to Rubik -->
  <alias>
    <family>ui-sans-serif</family>
    <prefer>
      <family>Rubik</family>
    </prefer>
  </alias>

  <!-- Map ui-monospace to JetBrains Mono -->
  <alias>
    <family>ui-monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
    </prefer>
  </alias>

  <!-- Rendering: slight hinting, subpixel RGB, antialiased -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

</fontconfig>
